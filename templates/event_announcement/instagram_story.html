<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="{{ fonts.google_fonts_url }}" rel="stylesheet">
<style>
  :root {
    --c-primary:      {{ colors.primary }};
    --c-primary-dark: {{ colors.primary_dark }};
    --c-secondary:    {{ colors.secondary }};
    --c-accent:       {{ colors.accent }};
    --c-white:        {{ colors.white }};
    --c-text-dark:    {{ colors.text_dark }};
    --c-overlay-dark: {{ colors.overlay_dark }};
    --c-overlay-mid:  {{ colors.overlay_mid }};
    --f-headline: '{{ fonts.headline }}', serif;
    --f-body:     '{{ fonts.body }}', sans-serif;
    --f-label:    '{{ fonts.label }}', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { width: 1080px; height: 1920px; overflow: hidden; }

  .slide {
    width: 1080px;
    height: 1920px;
    position: relative;
    font-family: var(--f-body);
    background: var(--c-primary-dark);
  }

  .hero {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.2;
  }

  /* Big rotated shard fills top-right */
  .shard {
    position: absolute;
    width: 900px;
    height: 900px;
    background: var(--c-primary);
    top: -300px;
    right: -300px;
    transform: rotate(28deg);
    border-radius: 80px;
    opacity: 0.5;
  }

  .shard-accent {
    position: absolute;
    width: 400px;
    height: 400px;
    background: var(--c-accent);
    bottom: -120px;
    left: -100px;
    transform: rotate(20deg);
    border-radius: 48px;
    opacity: 0.15;
  }

  .accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 10px;
    background: linear-gradient(to bottom, var(--c-accent), var(--c-primary));
    z-index: 10;
  }

  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 64px 56px 0;
    display: flex;
    align-items: center;
    gap: 24px;
    z-index: 5;
  }

  .logo {
    height: 96px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.4));
  }

  .school-info { display: flex; flex-direction: column; gap: 4px; }

  .school-name-text {
    font-family: var(--f-label);
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--c-white);
  }

  .school-city {
    font-family: var(--f-label);
    font-weight: 400;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--c-secondary);
  }

  /* Main content — vertically centered */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 200px 60px 200px;
    z-index: 5;
  }

  .event-label {
    font-family: var(--f-label);
    font-weight: 600;
    font-size: 20px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--c-accent);
    margin-bottom: 24px;
  }

  .headline {
    font-family: var(--f-headline);
    font-weight: 700;
    font-size: 108px;
    line-height: 1.05;
    color: var(--c-white);
    margin-bottom: 36px;
    white-space: pre-line;
  }

  .subheadline {
    font-family: var(--f-body);
    font-size: 30px;
    line-height: 1.5;
    color: rgba(255,255,255,0.72);
    max-width: 820px;
    margin-bottom: 56px;
  }

  /* Date card */
  .date-card {
    background: var(--c-accent);
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    padding: 20px 36px;
    border-radius: 20px;
    max-width: fit-content;
  }

  .date-label {
    font-family: var(--f-label);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--c-text-dark);
    opacity: 0.65;
  }

  .date-value {
    font-family: var(--f-headline);
    font-size: 44px;
    font-weight: 700;
    color: var(--c-text-dark);
    line-height: 1.1;
  }

  .time-value {
    font-family: var(--f-label);
    font-size: 22px;
    font-weight: 500;
    color: var(--c-text-dark);
    opacity: 0.7;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="shard"></div>
  <div class="shard-accent"></div>
  <div class="accent-bar"></div>

  {% if hero_image_b64 %}
    <img class="hero" src="{{ hero_image_b64 }}" alt="Event">
  {% endif %}

  <div class="top-bar">
    {% if logo_b64 %}
      <img class="logo" src="{{ logo_b64 }}" alt="{{ school_name }}">
    {% endif %}
    <div class="school-info">
      <span class="school-name-text">{{ school_name }}</span>
      <span class="school-city">{{ city }}</span>
    </div>
  </div>

  <div class="content">
    <div class="event-label">{{ event_label if event_label else "Upcoming Event" }}</div>
    <div class="headline">{{ headline }}</div>
    {% if subheadline %}
      <div class="subheadline">{{ subheadline }}</div>
    {% endif %}
    <div class="date-card">
      <span class="date-label">Date</span>
      <span class="date-value">{{ event_date }}</span>
      {% if event_time %}
        <span class="time-value">{{ event_time }}</span>
      {% endif %}
    </div>
  </div>
</div>
</body>
</html>
