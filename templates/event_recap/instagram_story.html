<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="{{ fonts.google_fonts_url }}" rel="stylesheet">
<style>
  :root {
    --c-primary:       {{ colors.primary }};
    --c-primary-dark:  {{ colors.primary_dark }};
    --c-secondary:     {{ colors.secondary }};
    --c-accent:        {{ colors.accent }};
    --c-white:         {{ colors.white }};
    --c-text-dark:     {{ colors.text_dark }};
    --c-overlay-dark:  {{ colors.overlay_dark }};
    --c-overlay-mid:   {{ colors.overlay_mid }};
    --c-overlay-light: {{ colors.overlay_light }};
    --f-headline: '{{ fonts.headline }}', serif;
    --f-body:     '{{ fonts.body }}', sans-serif;
    --f-label:    '{{ fonts.label }}', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { width: 1080px; height: 1920px; overflow: hidden; background: #111; }

  .slide {
    width: 1080px;
    height: 1920px;
    position: relative;
    font-family: var(--f-body);
  }

  .hero {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .hero-fallback {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, var(--c-primary) 0%, var(--c-primary-dark) 100%);
  }

  /* Gradient: transparent top → heavy brand color at bottom */
  .gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent            0%,
      transparent           35%,
      var(--c-overlay-light) 52%,
      var(--c-overlay-mid)   68%,
      var(--c-overlay-dark)  100%
    );
  }

  .accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 10px;
    background: linear-gradient(to bottom, var(--c-accent) 0%, var(--c-primary) 100%);
    z-index: 10;
  }

  /* Top: logo + school name */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 52px 52px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 5;
  }

  .logo {
    height: 88px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
  }

  .school-label {
    font-family: var(--f-label);
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--c-secondary);
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }

  /* Bottom content */
  .bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 60px 80px;
    z-index: 5;
  }

  .event-eyebrow {
    font-family: var(--f-label);
    font-weight: 600;
    font-size: 20px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--c-accent);
    margin-bottom: 20px;
  }

  .headline {
    font-family: var(--f-headline);
    font-weight: 700;
    font-size: 96px;
    line-height: 1.08;
    color: var(--c-white);
    text-shadow: 0 4px 20px rgba(0,0,0,0.4);
    margin-bottom: 32px;
    white-space: pre-line;
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .date-pill {
    background: var(--c-accent);
    color: var(--c-text-dark);
    font-family: var(--f-label);
    font-weight: 700;
    font-size: 20px;
    padding: 10px 26px;
    border-radius: 100px;
  }

  .tagline {
    font-family: var(--f-body);
    font-size: 18px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="accent-bar"></div>

  {% if cover_image_b64 %}
    <img class="hero" src="{{ cover_image_b64 }}" alt="Event photo">
  {% else %}
    <div class="hero-fallback"></div>
  {% endif %}

  <div class="gradient"></div>

  <div class="top-bar">
    {% if logo_b64 %}
      <img class="logo" src="{{ logo_b64 }}" alt="{{ school_name }}">
    {% endif %}
    <span class="school-label">{{ school_name }}</span>
  </div>

  <div class="bottom">
    <div class="event-eyebrow">{{ event_name }}</div>
    <div class="headline">{{ cover_headline }}</div>
    <div class="meta-row">
      {% if event_date_str %}
        <span class="date-pill">{{ event_date_str }}</span>
      {% endif %}
      {% if tagline %}
        <span class="tagline">{{ tagline }}</span>
      {% endif %}
    </div>
  </div>
</div>
</body>
</html>
