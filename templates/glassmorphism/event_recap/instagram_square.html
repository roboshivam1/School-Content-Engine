<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="{{ fonts.google_fonts_url }}" rel="stylesheet">
<style>
  /* ── All Jinja2 interpolation lives ONLY in :root — rest is pure CSS ── */
  :root {
    --c-primary:       {{ colors.primary }};
    --c-primary-dark:  {{ colors.primary_dark }};
    --c-secondary:     {{ colors.secondary }};
    --c-accent:        {{ colors.accent }};
    --c-white:         {{ colors.white }};
    --c-text-dark:     {{ colors.text_dark }};
    --c-overlay-dark:  {{ colors.overlay_dark }};
    --c-overlay-mid:   {{ colors.overlay_mid }};
    --c-overlay-light: {{ colors.overlay_light }};
    --f-headline: '{{ fonts.headline }}', serif;
    --f-body:     '{{ fonts.body }}', sans-serif;
    --f-label:    '{{ fonts.label }}', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  
  /* Instagram Post Dimensions */
  body { width: 1080px; height: 1080px; overflow: hidden; background: var(--c-primary-dark); }

  .slide {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    font-family: var(--f-body);
  }

  /* 1. Full Bleed Image */
  .hero {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 1;
  }

  .hero-fallback {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--c-primary-dark) 0%, var(--c-primary) 100%);
    z-index: 1;
  }

  /* Subtle vignette to focus the center and aid contrast, replacing the flat dark gradient */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.5) 100%);
    z-index: 2;
  }

  /* 2. Floating Header & Strict Logo Constraint */
  .top-bar {
    position: absolute;
    top: 40px; 
    left: 40px; 
    right: 40px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    z-index: 10;
  }

  .brand-pill {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 12px 24px 12px 16px;
    border-radius: 100px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }

  .logo {
    height: 48px; /* Hard-capped height to stop it from covering the photo */
    width: 48px;
    object-fit: contain;
  }

  .school-label {
    font-family: var(--f-label);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--c-white);
  }

  /* 3. Glassmorphic Content Card replacing the boxy bottom */
  .content-card {
    position: absolute;
    bottom: 40px; 
    left: 40px; 
    right: 40px;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 32px;
    padding: 48px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    z-index: 10;
    overflow: hidden;
  }

  /* Elegant accent line inside the glass card */
  .content-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--c-accent), var(--c-primary));
  }

  .event-eyebrow {
    font-family: var(--f-label);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--c-accent);
    margin-bottom: 20px;
    display: inline-block;
  }

  .headline {
    font-family: var(--f-headline);
    font-weight: 700;
    font-size: 56px;
    line-height: 1.2;
    color: var(--c-white);
    margin-bottom: 32px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    white-space: pre-line;
  }

  .meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(255,255,255,0.15);
    padding-top: 24px;
  }

  .date-pill {
    background: var(--c-accent);
    color: var(--c-text-dark);
    font-family: var(--f-label);
    font-weight: 700;
    font-size: 16px;
    padding: 10px 24px;
    border-radius: 100px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  }

  .swipe-hint {
    color: rgba(255,255,255,0.85);
    font-family: var(--f-body);
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="slide">
  
  {% if cover_image_b64 %}
    <img class="hero" src="{{ cover_image_b64 }}" alt="Event photo">
  {% else %}
    <div class="hero-fallback"></div>
  {% endif %}

  <div class="vignette"></div>

  <div class="top-bar">
    <div class="brand-pill">
      {% if logo_b64 %}
        <img class="logo" src="{{ logo_b64 }}" alt="{{ school_name }}">
      {% endif %}
      <span class="school-label">{{ school_name }}</span>
    </div>
  </div>

  <div class="content-card">
    <div class="event-eyebrow">{{ event_name }}</div>
    <div class="headline">{{ cover_headline }}</div>
    
    <div class="meta-row">
      {% if event_date_str %}
        <span class="date-pill">{{ event_date_str }}</span>
      {% else %}
        <span></span> 
      {% endif %}
      <span class="swipe-hint">Swipe to see more →</span>
    </div>
  </div>

</div>
</body>
</html>
