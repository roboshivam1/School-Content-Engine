<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="{{ fonts.google_fonts_url }}" rel="stylesheet">
<style>
  /* ── All Jinja2 interpolation lives ONLY in :root ── */
  :root {
    --c-primary:      {{ colors.primary }};
    --c-primary-dark: {{ colors.primary_dark }};
    --c-secondary:    {{ colors.secondary }};
    --c-accent:       {{ colors.accent }};
    --c-white:        {{ colors.white }};
    --c-text-dark:    {{ colors.text_dark }};
    --f-headline: '{{ fonts.headline }}', serif;
    --f-body:     '{{ fonts.body }}', sans-serif;
    --f-label:    '{{ fonts.label }}', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  
  /* Instagram Post Dimensions */
  body { width: 1080px; height: 1080px; overflow: hidden; background: var(--c-primary-dark); }

  .slide {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    font-family: var(--f-body);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 1. Cinematic Full-Bleed Background */
  .hero {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 1;
  }

  /* Rich fallback gradient for glass to distort if no image is used */
  .hero-fallback {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 80% 20%, var(--c-primary) 0%, var(--c-primary-dark) 60%, #1a0515 100%);
    z-index: 1;
  }

  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
    z-index: 2;
  }

  /* 2. Standardized Floating Brand Pill */
  .top-bar {
    position: absolute;
    top: 40px; 
    left: 40px; 
    right: 40px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    z-index: 10;
  }

  .brand-pill {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 12px 24px 12px 16px;
    border-radius: 100px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }

  .logo {
    height: 48px;
    width: 48px;
    object-fit: contain;
  }

  .school-label {
    font-family: var(--f-label);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--c-white);
  }

  /* 3. Grand Centered Glass Greeting Card */
  .center-card {
    position: relative;
    z-index: 10;
    width: 880px;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03));
    backdrop-filter: blur(35px);
    -webkit-backdrop-filter: blur(35px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 48px;
    padding: 80px 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    box-shadow: 0 40px 80px rgba(0,0,0,0.4);
    margin-top: 40px; /* Accounts for top bar space */
  }

  /* Signature top accent line applied to card */
  .center-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, var(--c-accent), var(--c-primary));
  }

  /* 4. Refined Typography Hierarchy */
  .festival-label {
    font-family: var(--f-label);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--c-accent);
    margin-bottom: 24px;
  }

  .festival-name {
    font-family: var(--f-headline);
    font-weight: 700;
    font-size: 88px;
    line-height: 1.1;
    color: var(--c-white);
    margin-bottom: 12px;
    text-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .year {
    font-family: var(--f-label);
    font-size: 24px;
    font-weight: 600;
    color: var(--c-white);
    letter-spacing: 6px;
    opacity: 0.8;
    margin-bottom: 40px;
  }

  /* Modernized Minimal Divider */
  .deco-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
    opacity: 0.8;
  }
  
  .deco-line { 
    width: 60px; 
    height: 2px; 
    background: linear-gradient(90deg, transparent, var(--c-accent)); 
  }
  
  .deco-line.right {
    background: linear-gradient(270deg, transparent, var(--c-accent)); 
  }

  .deco-diamond {
    width: 8px; height: 8px;
    background: var(--c-accent);
    transform: rotate(45deg);
    box-shadow: 0 0 10px var(--c-accent);
  }

  .greeting {
    font-family: var(--f-body);
    font-size: 28px;
    line-height: 1.6;
    color: rgba(255,255,255,0.85);
    max-width: 700px;
    margin-bottom: 24px;
  }

  .hindi-greeting {
    font-family: var(--f-body);
    font-weight: 600;
    font-size: 32px;
    line-height: 1.5;
    color: var(--c-accent);
    margin-bottom: 0;
  }
</style>
</head>
<body>
<div class="slide">
  
  {% if hero_image_b64 %}
    <img class="hero" src="{{ hero_image_b64 }}" alt="Festival Background">
  {% else %}
    <div class="hero-fallback"></div>
  {% endif %}

  <div class="vignette"></div>

  <div class="top-bar">
    <div class="brand-pill">
      {% if logo_b64 %}
        <img class="logo" src="{{ logo_b64 }}" alt="{{ school_name }}">
      {% endif %}
      <span class="school-label">{{ school_name }}</span>
    </div>
  </div>

  <div class="center-card">
    <div class="festival-label">Warm Wishes</div>
    
    <div class="festival-name">{{ festival_name }}</div>
    
    {% if year %}
      <div class="year">{{ year }}</div>
    {% endif %}

    <div class="deco-divider">
      <div class="deco-line"></div>
      <div class="deco-diamond"></div>
      <div class="deco-line right"></div>
    </div>

    <div class="greeting">{{ greeting_line }}</div>

    {% if hindi_greeting %}
      <div class="hindi-greeting">{{ hindi_greeting }}</div>
    {% endif %}
  </div>

</div>
</body>
</html>
