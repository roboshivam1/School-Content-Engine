<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="{{ fonts.google_fonts_url }}" rel="stylesheet">
<style>
  /* ── All Jinja2 interpolation lives ONLY in :root ── */
  :root {
    --c-primary:      {{ colors.primary }};
    --c-primary-dark: {{ colors.primary_dark }};
    --c-secondary:    {{ colors.secondary }};
    --c-accent:       {{ colors.accent }};
    --c-white:        {{ colors.white }};
    --c-off-white:    {{ colors.off_white }};
    --c-text-dark:    {{ colors.text_dark }};
    --f-headline: '{{ fonts.headline }}', serif;
    --f-body:     '{{ fonts.body }}', sans-serif;
    --f-label:    '{{ fonts.label }}', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  
  /* Instagram Post Dimensions */
  body { width: 1080px; height: 1080px; overflow: hidden; background: var(--c-primary-dark); }

  .slide {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    font-family: var(--f-body);
  }

  /* 1. Cinematic Full-Bleed Background */
  .hero {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 1;
  }

  /* Rich fallback gradient for glass to distort if no image is used */
  .hero-fallback {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 30%, var(--c-primary) 0%, var(--c-primary-dark) 60%, #1a0515 100%);
    z-index: 1;
  }

  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.85) 100%);
    z-index: 2;
  }

  /* 2. Standardized Floating Brand Pill */
  .top-bar {
    position: absolute;
    top: 40px; 
    left: 40px; 
    right: 40px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    z-index: 10;
  }

  .brand-pill {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 12px 24px 12px 16px;
    border-radius: 100px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }

  .logo {
    height: 48px;
    width: 48px;
    object-fit: contain;
  }

  .school-label {
    font-family: var(--f-label);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--c-white);
  }

  /* 3. Central Glass Spotlight Card */
  .center-card {
    position: absolute;
    top: 240px; /* Pushed down to allow photo overlap */
    left: 60px;
    right: 60px;
    bottom: 60px;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03));
    backdrop-filter: blur(35px);
    -webkit-backdrop-filter: blur(35px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 48px;
    padding: 140px 60px 40px; /* High top padding makes room for the photo */
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    box-shadow: 0 40px 80px rgba(0,0,0,0.4);
    z-index: 10;
  }

  /* Signature top accent line */
  .center-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, var(--c-accent), var(--c-primary));
  }

  /* 4. Breaking the Grid: Intersecting Photo */
  .photo-wrap {
    position: absolute;
    top: -120px; /* Pulls the photo up out of the glass box */
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    height: 240px;
    border-radius: 50%;
    border: 6px solid rgba(255, 255, 255, 0.2);
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    z-index: 15;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .photo-inner {
    width: 216px;
    height: 216px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
  }

  .photo-placeholder {
    width: 216px;
    height: 216px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
    border: 2px dashed rgba(255,255,255,0.3);
  }

  /* Premium Star Badge */
  .star-badge {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--c-accent), #FFD700);
    border-radius: 50%;
    border: 4px solid var(--c-primary-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 16;
  }

  /* 5. Typography */
  .headline {
    font-family: var(--f-label);
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--c-accent);
    margin-bottom: 16px;
  }

  .student-name {
    font-family: var(--f-headline);
    font-weight: 700;
    font-size: 64px;
    color: var(--c-white);
    line-height: 1.1;
    margin-bottom: 8px;
    text-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .class-section {
    font-family: var(--f-label);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 24px;
  }

  .divider {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--c-accent), transparent);
    border-radius: 2px;
    margin: 0 auto 28px;
    opacity: 0.8;
  }

  .achievement {
    font-family: var(--f-body);
    font-size: 28px;
    line-height: 1.5;
    color: rgba(255,255,255,0.9);
    font-weight: 500;
    max-width: 800px;
    margin: 0 auto 24px;
  }

  .quote {
    font-family: var(--f-headline);
    font-style: italic;
    font-size: 24px;
    color: var(--c-accent);
    opacity: 0.9;
    max-width: 760px;
    margin: 0 auto;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="slide">
  
  {% if hero_image_b64 %}
    <img class="hero" src="{{ hero_image_b64 }}" alt="Spotlight Background">
  {% else %}
    <div class="hero-fallback"></div>
  {% endif %}

  <div class="vignette"></div>

  <div class="top-bar">
    <div class="brand-pill">
      {% if logo_b64 %}
        <img class="logo" src="{{ logo_b64 }}" alt="{{ school_name }}">
      {% endif %}
      <span class="school-label">{{ school_name }}</span>
    </div>
  </div>

  <div class="center-card">
    
    <div class="photo-wrap">
      {% if photo_b64 %}
        <img class="photo-inner" src="{{ photo_b64 }}" alt="{{ student_name }}">
      {% else %}
        <div class="photo-placeholder"></div>
      {% endif %}
      <div class="star-badge">⭐</div>
    </div>

    <div class="headline">{{ headline }}</div>
    
    <div class="student-name">{{ student_name }}</div>
    
    {% if class_section %}
      <div class="class-section">{{ class_section }}</div>
    {% endif %}
    
    <div class="divider"></div>
    
    <div class="achievement">{{ achievement }}</div>
    
    {% if quote %}
      <div class="quote">"{{ quote }}"</div>
    {% endif %}
    
  </div>

</div>
</body>
</html>
