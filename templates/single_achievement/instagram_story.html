<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="{{ fonts.google_fonts_url }}" rel="stylesheet">
<style>
  :root {
    --c-primary:      {{ colors.primary }};
    --c-primary-dark: {{ colors.primary_dark }};
    --c-secondary:    {{ colors.secondary }};
    --c-accent:       {{ colors.accent }};
    --c-white:        {{ colors.white }};
    --c-off-white:    {{ colors.off_white }};
    --c-text-dark:    {{ colors.text_dark }};
    --f-headline: '{{ fonts.headline }}', serif;
    --f-body:     '{{ fonts.body }}', sans-serif;
    --f-label:    '{{ fonts.label }}', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { width: 1080px; height: 1920px; overflow: hidden; }

  .slide {
    width: 1080px;
    height: 1920px;
    position: relative;
    font-family: var(--f-body);
    background: linear-gradient(160deg, var(--c-primary-dark) 0%, #2D0828 100%);
  }

  /* Large photo takes top 55% */
  .photo-section {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1050px;
    overflow: hidden;
  }

  .photo-section img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .photo-section-fallback {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, var(--c-primary) 0%, var(--c-primary-dark) 100%);
  }

  /* Gradient fade from photo into dark bottom */
  .photo-fade {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 500px;
    background: linear-gradient(to bottom, transparent, var(--c-primary-dark));
  }

  .accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 10px;
    background: linear-gradient(to bottom, var(--c-accent), var(--c-primary));
    z-index: 10;
  }

  /* Top bar */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 60px 56px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 5;
  }

  .logo {
    height: 80px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
  }

  .school-label {
    font-family: var(--f-label);
    font-size: 19px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.8);
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  }

  /* Bottom content area */
  .content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 60px 80px;
    z-index: 5;
  }

  .headline-label {
    font-family: var(--f-label);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--c-accent);
    margin-bottom: 20px;
  }

  .student-name {
    font-family: var(--f-headline);
    font-weight: 700;
    font-size: 96px;
    line-height: 1.0;
    color: var(--c-white);
    margin-bottom: 16px;
  }

  .class-section {
    font-family: var(--f-label);
    font-size: 20px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--c-secondary);
    margin-bottom: 36px;
  }

  .achievement-pill {
    display: inline-block;
    background: var(--c-accent);
    color: var(--c-text-dark);
    font-family: var(--f-headline);
    font-weight: 700;
    font-size: 36px;
    padding: 14px 32px;
    border-radius: 16px;
    margin-bottom: 28px;
  }

  .achievement-detail {
    font-family: var(--f-body);
    font-size: 28px;
    line-height: 1.5;
    color: rgba(255,255,255,0.75);
    max-width: 820px;
    margin-bottom: 32px;
  }

  .quote {
    font-family: var(--f-headline);
    font-style: italic;
    font-size: 26px;
    color: var(--c-secondary);
    opacity: 0.85;
    line-height: 1.5;
    max-width: 820px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="photo-section">
    {% if photo_b64 %}
      <img src="{{ photo_b64 }}" alt="{{ student_name }}">
    {% else %}
      <div class="photo-section-fallback"></div>
    {% endif %}
    <div class="photo-fade"></div>
  </div>

  <div class="accent-bar"></div>

  <div class="top-bar">
    {% if logo_b64 %}
      <img class="logo" src="{{ logo_b64 }}" alt="{{ school_name }}">
    {% endif %}
    <span class="school-label">{{ school_name }}</span>
  </div>

  <div class="content">
    <div class="headline-label">{{ headline }}</div>
    <div class="student-name">{{ student_name }}</div>
    {% if class_section %}
      <div class="class-section">{{ class_section }}</div>
    {% endif %}
    <div class="achievement-pill">{{ achievement }}</div>
    {% if quote %}
      <div class="quote">"{{ quote }}"</div>
    {% endif %}
  </div>
</div>
</body>
</html>
