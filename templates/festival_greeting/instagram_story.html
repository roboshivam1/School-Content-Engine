<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="{{ fonts.google_fonts_url }}" rel="stylesheet">
<style>
  :root {
    --c-primary:      {{ colors.primary }};
    --c-primary-dark: {{ colors.primary_dark }};
    --c-secondary:    {{ colors.secondary }};
    --c-accent:       {{ colors.accent }};
    --c-white:        {{ colors.white }};
    --c-text-dark:    {{ colors.text_dark }};
    --f-headline: '{{ fonts.headline }}', serif;
    --f-body:     '{{ fonts.body }}', sans-serif;
    --f-label:    '{{ fonts.label }}', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { width: 1080px; height: 1920px; overflow: hidden; }

  .slide {
    width: 1080px;
    height: 1920px;
    position: relative;
    font-family: var(--f-body);
    background: linear-gradient(160deg, var(--c-primary-dark) 0%, #3D0B30 60%, var(--c-primary-dark) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Top + bottom accent bands */
  .band { position: absolute; left: 0; right: 0; height: 20px; background: var(--c-accent); }
  .band-top { top: 0; }
  .band-bottom { bottom: 0; }

  /* Glow effects */
  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
  }
  .glow-1 { width: 700px; height: 700px; background: var(--c-primary); opacity: 0.3; top: -200px; right: -200px; }
  .glow-2 { width: 600px; height: 600px; background: var(--c-accent); opacity: 0.1; bottom: -150px; left: -150px; }

  /* Decorative frame */
  .frame { position: absolute; inset: 48px; border: 1px solid rgba(255,255,255,0.1); }

  .corner-ornament {
    position: absolute;
    width: 52px; height: 52px;
    border-color: var(--c-accent);
    border-style: solid;
    opacity: 0.65;
  }
  .co-tl { top: 64px; left: 64px; border-width: 3px 0 0 3px; }
  .co-tr { top: 64px; right: 64px; border-width: 3px 3px 0 0; }
  .co-bl { bottom: 64px; left: 64px; border-width: 0 0 3px 3px; }
  .co-br { bottom: 64px; right: 64px; border-width: 0 3px 3px 0; }

  .content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 100px;
    gap: 0;
  }

  .logo {
    height: 140px;
    width: auto;
    object-fit: contain;
    margin-bottom: 56px;
    filter: drop-shadow(0 2px 14px rgba(0,0,0,0.4));
  }

  .festival-label {
    font-family: var(--f-label);
    font-size: 18px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--c-accent);
    margin-bottom: 20px;
  }

  .festival-name {
    font-family: var(--f-headline);
    font-weight: 700;
    font-size: 128px;
    line-height: 1.0;
    color: var(--c-white);
    margin-bottom: 10px;
  }

  .year {
    font-family: var(--f-label);
    font-size: 32px;
    color: var(--c-accent);
    letter-spacing: 5px;
    margin-bottom: 52px;
  }

  .deco-divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 52px;
  }
  .deco-line { width: 100px; height: 1px; background: var(--c-accent); opacity: 0.55; }
  .deco-diamond { width: 12px; height: 12px; background: var(--c-accent); transform: rotate(45deg); }

  .greeting {
    font-family: var(--f-body);
    font-size: 34px;
    line-height: 1.6;
    color: rgba(255,255,255,0.8);
    margin-bottom: 32px;
  }

  .hindi-greeting {
    font-family: var(--f-body);
    font-size: 34px;
    line-height: 1.55;
    color: var(--c-secondary);
    font-style: italic;
    margin-bottom: 64px;
  }

  .school-name {
    font-family: var(--f-label);
    font-size: 20px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.38);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="band band-top"></div>
  <div class="band band-bottom"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="frame"></div>
  <div class="corner-ornament co-tl"></div>
  <div class="corner-ornament co-tr"></div>
  <div class="corner-ornament co-bl"></div>
  <div class="corner-ornament co-br"></div>

  <div class="content">
    {% if logo_b64 %}
      <img class="logo" src="{{ logo_b64 }}" alt="{{ school_name }}">
    {% endif %}
    <div class="festival-label">Warm Wishes from</div>
    <div class="festival-name">{{ festival_name }}</div>
    {% if year %}<div class="year">{{ year }}</div>{% endif %}
    <div class="deco-divider">
      <div class="deco-line"></div>
      <div class="deco-diamond"></div>
      <div class="deco-line"></div>
    </div>
    <div class="greeting">{{ greeting_line }}</div>
    {% if hindi_greeting %}
      <div class="hindi-greeting">{{ hindi_greeting }}</div>
    {% endif %}
    <div class="school-name">{{ school_name }}</div>
  </div>
</div>
</body>
</html>
